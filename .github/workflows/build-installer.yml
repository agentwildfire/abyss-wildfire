name: build-installer

on:
  push:
    paths:
      - 'setup.ps1'
  release:
    types: [created]

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Cache PS2EXE
        id: cache-ps2exe
        uses: actions/cache@v4
        with:
          path: C:\Users\runneradmin\Documents\PowerShell\Modules\ps2exe
          key: ps2exe-module

      - name: Install PS2EXE
        if: steps.cache-ps2exe.outputs.cache-hit != 'true'
        run: Install-Module ps2exe -Force -Scope CurrentUser
        shell: powershell

      - name: Get version
        id: version
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        shell: powershell

      - name: Build abyss-setup.exe
        run: |
          Invoke-PS2EXE `
            -InputFile .\setup.ps1 `
            -OutputFile .\abyss-setup-v${{ steps.version.outputs.VERSION }}.exe `
            -Title "Abyss Theme Setup" `
            -Description "Installer for Abyss - a clean minimal Jellyfin theme" `
            -Company "AumGupta" `
            -Product "Abyss" `
            -Version "${{ steps.version.outputs.VERSION }}" `
            -IconFile ".\docs\assets\favicon\favicon.ico" `
            -NoConsole:$false
        shell: powershell

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: abyss-setup-v${{ steps.version.outputs.VERSION }}.exe

      - name: Upload as artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: abyss-setup-v${{ steps.version.outputs.VERSION }}
          path: abyss-setup-v${{ steps.version.outputs.VERSION }}.exe